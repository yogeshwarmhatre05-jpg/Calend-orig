<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 40px;
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#1e3a8a 0%,#0f172a 45%,#020617 100%);
  color:#f5d77a;
}

/* ================= WRAPPER ================= */

.wrapper{
  width:100%;
  max-width:300px;
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:22px;
}

/* ================= MUSIC ================= */

.music-player, .calendar{
  width:100%;
  background:rgba(10,25,55,0.88);
  border-radius:24px;
  padding:12px;
  border:2px solid rgba(255,215,0,0.65);
}

/* ================= CHESSBOARD ================= */

.board-wrapper{
  width:100%;
  display:flex;
  justify-content:center;
  position:relative;
}

.board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:6px solid #020617;
}

.white{
  background:#d9e2ec;
}

.black{
  background:#486581;
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  pointer-events:none;
}

.title{
  position:absolute;
  top:-20px;
  font-size:11px;
  color:white;
  font-weight:bold;
}

/* ================= CALENDAR ================= */

.calendar{
  margin-top:5px;
}

.header{
  text-align:center;
  font-size:18px;
  font-weight:800;
  color:#ffd700;
}

.days,.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.dates div{
  height:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  border-radius:6px;
  font-size:11px;
}

.today{
  background:#ffd700 !important;
  color:#000 !important;
}

</style>
</head>

<body>

<div class="wrapper">

  <!-- MUSIC -->
  <div class="music-player">
    <iframe width="100%" height="160"
      src="https://www.youtube.com/embed/e_AZJzYe7CU"
      allowfullscreen>
    </iframe>
  </div>

  <!-- CHESSBOARD (INSERTED HERE) -->
  <div class="board-wrapper">
    <div class="title">Magnus Carlsen vs Topalov (2010)</div>
    <div class="board" id="board"></div>
  </div>

  <!-- CALENDAR -->
  <div class="calendar">
    <div class="header" id="monthYear"></div>
    <div class="days">
      <div>SUN</div><div>MON</div><div>TUE</div>
      <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>
    <div class="dates" id="dates"></div>
  </div>

</div>

<script>

/* ================= CHESS ================= */

const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState = [
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state = [...startState];

const board = document.getElementById("board");

function draw(){
  board.innerHTML="";
  state.forEach((p,i)=>{
    const sq=document.createElement("div");
    const r=Math.floor(i/8),c=i%8;
    sq.className="square "+((r+c)%2?"black":"white");

    if(p){
      const im=document.createElement("img");
      im.className="piece";
      im.src=img[p];
      sq.appendChild(im);
    }

    board.appendChild(sq);
  });
}

draw();

/* ================= CALENDAR ================= */

const monthYear=document.getElementById("monthYear");
const dates=document.getElementById("dates");

const now=new Date();
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

monthYear.innerText=`${months[now.getMonth()]} ${now.getFullYear()}`;

const firstDay=new Date(now.getFullYear(),now.getMonth(),1).getDay();
const lastDate=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=0;i<firstDay;i++) dates.innerHTML+="<div></div>";

for(let i=1;i<=lastDate;i++){
  dates.innerHTML+=`<div class="${i===now.getDate()?'today':''}">${i}</div>`;
}

</script>

</body>
</html>
