<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  background:#0F172A;
  color:#E2E8F0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body{
  position:relative;
}

/* RGB BORDER */

.rgbBorder{
  position:fixed;
  inset:0;
  padding:3px;
  background:linear-gradient(
    90deg,
    #ff0000,
    #ff9900,
    #ffee00,
    #00ff00,
    #00ffff,
    #0066ff,
    #aa00ff,
    #ff0000
  );
  background-size:400% 400%;
  animation:rgbMove 8s linear infinite;
  z-index:-1;
}

.rgbBorder::before{
  content:"";
  position:absolute;
  inset:3px;
  background:#0F172A;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

@keyframes discoRGB{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* MAIN */

.mainBox{
  width:300px;
  margin:auto;
  padding:14px;
  text-align:center;
  border:2px solid #1E293B;
  border-radius:12px;
  background:#0F172A;
}

.themeText{
  color:#22C55E;
}

.line{
  height:1px;
  background:rgba(255,255,255,0.15);
  margin:8px 20px;
}

/* PIXEL GLOW */

.pixelGlowBox{
  width:270px;
  height:60px;
  margin:auto;
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

.pixelBorder{
  position:absolute;
  inset:0;
  padding:2px;
  background:linear-gradient(
    90deg,
    #22C55E,
    white,
    #22C55E
  );
  background-size:300% 300%;
  animation:discoRGB 6s ease-in-out infinite;
}

.pixelBorder::before{
  content:"";
  position:absolute;
  inset:2px;
  background:#0F172A;
}

#pixelText{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1rem;
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  letter-spacing:2px;
  z-index:2;
  color:#22C55E;
  -webkit-text-stroke:1px #000;
}

/* PLAYER */

.player{
  width:260px;
  background:#0F172A;
  border:2px solid #1E293B;
  border-radius:10px;
  padding:8px;
  margin:auto;
  position:relative;
}

.live-dot{
  width:8px;
  height:8px;
  background:#22C55E;
  border-radius:50%;
  position:absolute;
  top:6px;
  left:6px;
  box-shadow:0 0 8px #22C55E;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:4px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 6s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border:2px solid #1E293B;
  border-radius:6px;
  overflow:hidden;
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

.controls button{
  background:#1E293B;
  color:#E2E8F0;
  border:1px solid #1E293B;
  width:28px;
  height:20px;
  border-radius:5px;
  cursor:pointer;
}

/* CHESS */

.chessContainer{
  width:250px;
  margin:auto;
}

.chessTitle{
  text-align:center;
  font-size:10px;
  margin-bottom:8px;
  color:#22C55E;
  letter-spacing:1px;
  font-weight:bold;
}

.boardWrapper{
  position:relative;
  width:250px;
  height:250px;
}

.board{
  width:250px;
  height:250px;
  border:2px solid #1E293B;
  border-radius:10px;
  overflow:hidden;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.light{
  background:#0ea5e9;
}

.dark{
  background:#075985;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

.coord{
  position:absolute;
  color:#cbd5e1;
  font-size:9px;
  font-weight:bold;
}

.file{
  bottom:-16px;
}

.rank{
  left:-14px;
}

/* CALENDAR */

.calendar{
  width:260px;
  background:#0F172A;
  border-radius:14px;
  border:2px solid #1E293B;
  padding:10px;
  margin:auto;
}

.header{
  font-size:15px;
  margin-bottom:8px;
  color:#22C55E;
  font-weight:700;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.days div{
  font-size:11px;
}

.dates div{
  padding:6px 0;
  border-radius:6px;
  background:#1E293B;
  font-size:11px;
}

.today{
  background:#22C55E !important;
  color:#0F172A;
}

/* PARTNERS */

.section{
  border:2px solid #1E293B;
  border-radius:12px;
  padding:15px;
  background:#0F172A;
  width:270px;
  margin:auto;
}

.section-title{
  background:#1E293B;
  border-radius:30px;
  padding:10px;
  margin-bottom:15px;
  color:#22C55E;
  font-weight:bold;
}

.partner-card{
  background:#1E293B;
  border:1px solid #1E293B;
  border-radius:14px;
  padding:15px;
  text-align:center;
  margin-bottom:12px;
  cursor:pointer;
}

.partner-card:hover{
  transform:scale(1.03);
  border-color:#22C55E;
}

.partner-img{
  width:70px;
  height:70px;
  border-radius:12px;
  object-fit:cover;
}

.partner-name{
  margin-top:8px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

<div class="pixelGlowBox">
<div class="pixelBorder"></div>

<div id="pixelText">
PIXEL GLOW
</div>
</div>

<br>

<div class="themeText" style="font-size:15px;letter-spacing:2px;">
<marquee behavior="scroll" direction="left" scrollamount="3">
♣Welcome to Our Club♣
</marquee>
</div>

<br>

<div style="font-size:11px;letter-spacing:3px;">
<span class="themeText" style="font-size:14px;">
✧ 𝐎 𝐖 𝐍 𝐄 𝐑 ✧
</span>
</div>

<div style="margin-top:6px;">

<img
src="https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/yogi136/php8h3mmr9lb0qd8ZyClyS.png"
width="100"
height="100"
style="border-radius:12px;border:2px solid #1E293B;">

</div>

<div
class="themeText"
style="
font-size:22px;
font-weight:900;
font-family:cursive;
margin-top:6px;
">
√𝓎𝓸𝓰𝓲136
</div>

<div class="line"></div>

<div style="font-size:12px;font-style:italic;">
“Think like a King. Play like a Master.”
</div>

<br>

<!-- PLAYER -->

<div class="player">

<div class="live-dot"></div>

<div class="marquee">
<span id="songText">Now Playing:</span>
</div>

<div class="screen">

<iframe
id="playerFrame"
src=""
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>
<button onclick="playVideo()">▶</button>
<button onclick="pauseVideo()">❚❚</button>
<button onclick="nextSong()">⏭</button>

</div>
</div>

<br>

<!-- CHESS -->

<div class="chessContainer">

<div class="chessTitle">
Magnus Carlsen vs Veselin Topalov (2010)
</div>

<div class="boardWrapper">

<div class="board" id="board"></div>

<div class="coord file" style="left:14px;">A</div>
<div class="coord file" style="left:45px;">B</div>
<div class="coord file" style="left:76px;">C</div>
<div class="coord file" style="left:107px;">D</div>
<div class="coord file" style="left:138px;">E</div>
<div class="coord file" style="left:169px;">F</div>
<div class="coord file" style="left:200px;">G</div>
<div class="coord file" style="left:231px;">H</div>

<div class="coord rank" style="top:8px;">8</div>
<div class="coord rank" style="top:39px;">7</div>
<div class="coord rank" style="top:70px;">6</div>
<div class="coord rank" style="top:101px;">5</div>
<div class="coord rank" style="top:132px;">4</div>
<div class="coord rank" style="top:163px;">3</div>
<div class="coord rank" style="top:194px;">2</div>
<div class="coord rank" style="top:225px;">1</div>

</div>
</div>

<br>
<br>

<!-- CALENDAR -->

<div class="calendar">

<div class="header" id="monthYear"></div>

<div class="days">
<div>S</div>
<div>M</div>
<div>T</div>
<div>W</div>
<div>T</div>
<div>F</div>
<div>S</div>
</div>

<div class="dates" id="dates"></div>

</div>

<br>

<!-- PARTNERS -->

<div class="section">

<div class="section-title">
◆ PARTNERS ◆
</div>

<div id="partnersContainer"></div>

</div>

<br>

<div style="
font-size:22px;
font-weight:900;
font-family:cursive;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:discoRGB 6s ease-in-out infinite;
display:inline-block;
">
Made by yogi136
</div>

</div>

<script>

/* SONGS */

let songs = [

{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown - The Stranglers"
},

{
src:"https://youtu.be/_XeE2aEiPHk",
name:"The Flame of Love - Rokudenashi"
}

];

let songIndex = 0;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");

function convert(url){

let id = url.split("youtu.be/")[1].split("?")[0];

return "https://www.youtube.com/embed/" +
id +
"?enablejsapi=1";

}

function loadVideo(i){

frame.src = convert(songs[i].src);

songText.innerText =
"Now Playing: " + songs[i].name;

}

function prevSong(){

songIndex--;

if(songIndex < 0){
songIndex = songs.length - 1;
}

loadVideo(songIndex);

}

function nextSong(){

songIndex++;

if(songIndex >= songs.length){
songIndex = 0;
}

loadVideo(songIndex);

}

function playVideo(){

frame.contentWindow.postMessage(
'{"event":"command","func":"playVideo","args":""}',
"*"
);

}

function pauseVideo(){

frame.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo","args":""}',
"*"
);

}

loadVideo(songIndex);

/* CHESS */

const pieces = {

P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",

p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"

};

const startBoard = [

"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"

];

let boardState = [...startBoard];

const board = document.getElementById("board");

const moves = [

[52,36],
[11,27],

[36,27],
[3,27],

[57,42],
[27,24],

[51,35],
[6,21],

[62,45],
[10,18],

[61,34],
[2,29],

[34,43],
[12,20],

[59,52],
[29,38],

["castleWhite"],

[1,18],

[43,34],

["castleBlack"],

[55,39],

[8,16],

[45,28]

];

function drawBoard(){

board.innerHTML = "";

boardState.forEach((piece,index)=>{

const square = document.createElement("div");

const row = Math.floor(index / 8);
const col = index % 8;

square.className =
"square " +
((row + col) % 2 === 0 ? "light" : "dark");

if(piece){

const img = document.createElement("img");

img.src = pieces[piece];

img.className = "piece";

square.appendChild(img);

}

board.appendChild(square);

});

}

let moveIndex = 0;

function resetBoard(){

boardState = [...startBoard];

moveIndex = 0;

drawBoard();

}

function playMoves(){

if(moveIndex >= moves.length){

setTimeout(()=>{

resetBoard();

playMoves();

},2500);

return;

}

setTimeout(()=>{

const move = moves[moveIndex];

if(move[0] === "castleWhite"){

boardState[62] = boardState[60];
boardState[60] = "";

boardState[61] = boardState[63];
boardState[63] = "";

}

else if(move[0] === "castleBlack"){

boardState[6] = boardState[4];
boardState[4] = "";

boardState[5] = boardState[7];
boardState[7] = "";

}

else{

const [from,to] = move;

boardState[to] = boardState[from];

boardState[from] = "";

}

drawBoard();

moveIndex++;

playMoves();

},700);

}

drawBoard();

playMoves();

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [
"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"
];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month + 1,0).getDate();

for(let i=0;i<firstDay;i++){

dates.innerHTML += "<div></div>";

}

for(let i=1;i<=lastDate;i++){

if(i === today){

dates.innerHTML +=
`<div class="today">${i}</div>`;

}

else{

dates.innerHTML += `<div>${i}</div>`;

}

}

</script>

</body>
</html>
