<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  background:#0F172A;
  color:#E2E8F0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  transition:background 1s ease;
}

body{position:relative;}

/* RGB BORDER */
.rgbBorder{
  position:fixed;
  inset:0;
  padding:3px;
  background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff00,#00ffff,#0066ff,#aa00ff,#ff0000);
  background-size:400% 400%;
  animation:rgbMove 8s linear infinite;
  z-index:-1;
}

.rgbBorder::before{
  content:"";
  position:absolute;
  inset:3px;
  background:#0F172A;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

@keyframes discoRGB{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* MAIN BOX */
.mainBox{
  width:300px;
  margin:auto;
  padding:14px;
  text-align:center;
  border:2px solid #1E293B;
  border-radius:12px;
  background:#0F172A;
  transition:all 1s ease;
}

.themeText{
  color:#22C55E;
  transition:all 1s ease;
}

.line{
  height:1px;
  background:rgba(255,255,255,0.15);
  margin:8px 20px;
}

/* PIXEL GLOW */
.pixelGlowBox{
  width:270px;
  height:60px;
  margin:auto;
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

.pixelBorder{
  position:absolute;
  inset:0;
  padding:2px;
  background:linear-gradient(90deg,#22C55E,white,#22C55E);
  background-size:300% 300%;
  animation:discoRGB 6s ease-in-out infinite;
}

.pixelBorder::before{
  content:"";
  position:absolute;
  inset:2px;
  background:#0F172A;
}

#pixelText{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1rem;
  font-weight:700;
  letter-spacing:2px;
  color:#22C55E;
}

/* PLAYER */
.player{
  width:260px;
  background:#0F172A;
  border:2px solid #1E293B;
  border-radius:10px;
  padding:8px;
  margin:auto;
}

/* CHESS GAME AREA */
#game{
  width:250px;
  height:250px;
  border:2px solid #1E293B;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0F172A;
}

.board-wrapper{
  width:240px;
  height:240px;
}

.board{
  width:240px;
  height:240px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
}

.white{background:#d7e3f0;}
.black{background:#2f4858;}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
}

/* CALENDAR */
.calendar{
  width:260px;
  margin:auto;
  border:2px solid #1E293B;
  border-radius:14px;
  padding:10px;
}

.days,.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.dates div{
  background:#1E293B;
  padding:6px;
  border-radius:6px;
  font-size:11px;
}

.today{
  background:#22C55E !important;
  color:#0F172A;
}

/* PARTNERS */
.section{
  width:270px;
  margin:auto;
  border:2px solid #1E293B;
  border-radius:12px;
  padding:15px;
}

.partner-card{
  background:#1E293B;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  cursor:pointer;
}

.partner-img{
  width:60px;
  height:60px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

  <div class="pixelGlowBox">
    <div class="pixelBorder"></div>
    <div id="pixelText">PIXEL GLOW</div>
  </div>

  <br>

  <div class="themeText">♣ Welcome to Our Club ♣</div>

  <div id="game">
    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>
  </div>

  <br>

  <!-- CALENDAR -->
  <div class="calendar">
    <div id="monthYear"></div>
    <div class="dates" id="dates"></div>
  </div>

  <br>

  <!-- PARTNERS -->
  <div class="section">
    <div class="themeText">PARTNERS</div>
    <div id="partnersContainer"></div>
  </div>

</div>

<script>

/* ===== CHESS ===== */

const img={
P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const start=[
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state=[...start];
const board=document.getElementById("board");

function draw(){
board.innerHTML="";
state.forEach((p,i)=>{
const sq=document.createElement("div");
const r=Math.floor(i/8),c=i%8;
sq.className="square "+((r+c)%2?"black":"white");
if(p){
const im=document.createElement("img");
im.src=img[p];
im.className="piece";
sq.appendChild(im);
}
board.appendChild(sq);
});
}
draw();

/* ===== CALENDAR ===== */

const m=document.getElementById("monthYear");
const d=document.getElementById("dates");

const now=new Date();
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

m.innerText=months[now.getMonth()]+" "+now.getFullYear();

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=0;i<first;i++) d.innerHTML+="<div></div>";

for(let i=1;i<=last;i++){
d.innerHTML+=`<div class="${i===now.getDate()?'today':''}">${i}</div>`;
}

/* ===== PARTNERS ===== */

const partners=[
{name:"SAPPHIRE",img:"https://i.ibb.co/4RYLGQ3z/image.jpg",link:"#"},
{name:"PENGUIN",img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",link:"#"}
];

const pc=document.getElementById("partnersContainer");

partners.forEach(p=>{
let div=document.createElement("div");
div.className="partner-card";
div.innerHTML=`<img class="partner-img" src="${p.img}"><br>${p.name}`;
div.onclick=()=>window.open(p.link);
pc.appendChild(div);
});

</script>

</body>
</html>
