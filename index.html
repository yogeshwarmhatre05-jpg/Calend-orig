<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Glow Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  padding:0;
  background:#0F172A;
  color:#E2E8F0;
  font-family:Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

body{
  position:relative;
}

/* RGB BORDER */

.rgbBorder{
  position:fixed;
  inset:0;
  padding:3px;
  background:linear-gradient(
    90deg,
    #ff0000,
    #ff9900,
    #ffee00,
    #00ff00,
    #00ffff,
    #0066ff,
    #aa00ff,
    #ff0000
  );
  background-size:400% 400%;
  animation:rgbMove 8s linear infinite;
  z-index:-1;
}

.rgbBorder::before{
  content:"";
  position:absolute;
  inset:3px;
  background:#0F172A;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

@keyframes discoRGB{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* MAIN */

.mainBox{
  width:300px;
  margin:auto;
  padding:14px;
  text-align:center;
  border:2px solid #1E293B;
  border-radius:12px;
  background:#0F172A;
  transition:
  background 1s ease,
  border-color 1s ease,
  box-shadow 1s ease;
}

.themeText{
  color:#22C55E;
  transition:
  color 1s ease,
  text-shadow 1s ease;
}

.line{
  height:1px;
  background:rgba(255,255,255,0.15);
  margin:8px 20px;
}

/* PIXEL GLOW */

.pixelGlowBox{
  width:270px;
  height:60px;
  margin:auto;
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

.pixelBorder{
  position:absolute;
  inset:0;
  padding:2px;
  background:linear-gradient(
    90deg,
    #22C55E,
    white,
    #22C55E
  );
  background-size:300% 300%;
  animation:discoRGB 6s ease-in-out infinite;
}

.pixelBorder::before{
  content:"";
  position:absolute;
  inset:2px;
  background:#0F172A;
}

#pixelText{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1rem;
  font-family:'Montserrat',sans-serif;
  font-weight:700;
  letter-spacing:2px;
  z-index:2;
  color:#22C55E;
  -webkit-text-stroke:1px #000;
}

/* PLAYER */

.player{
  width:260px;
  background:#0F172A;
  border:2px solid #1E293B;
  border-radius:10px;
  padding:8px;
  margin:auto;
  position:relative;
}

.live-dot{
  width:8px;
  height:8px;
  background:#22C55E;
  border-radius:50%;
  position:absolute;
  top:6px;
  left:6px;
  box-shadow:0 0 8px #22C55E;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  font-size:11px;
  margin-bottom:4px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 6s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border:2px solid #1E293B;
  border-radius:6px;
  overflow:hidden;
}

.screen iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:5px;
}

.controls button{
  background:#1E293B;
  color:#E2E8F0;
  border:1px solid #1E293B;
  width:28px;
  height:20px;
  border-radius:5px;
  cursor:pointer;
}

/* CHESSBOARD */

.board-wrapper{
  position:relative;
  width:260px;
  margin:auto;
}

.board{
  width:260px;
  height:260px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:4px solid #020617;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

.coord{
  position:absolute;
  font-size:8px;
  color:#cbd5e1;
  font-weight:bold;
}

.file{
  bottom:-16px;
}

.rank{
  left:-14px;
}

.title{
  position:absolute;
  top:-22px;
  left:0;
  width:100%;
  text-align:center;
  color:#e2e8f0;
  font-size:9px;
  font-weight:bold;
  letter-spacing:1px;
}

/* CALENDAR */

.calendar{
  width:260px;
  background:#0F172A;
  border-radius:14px;
  border:2px solid #1E293B;
  padding:10px;
  margin:auto;
}

.header{
  font-size:15px;
  margin-bottom:8px;
  color:#22C55E;
  font-weight:700;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.days div{
  font-size:11px;
}

.dates div{
  padding:6px 0;
  border-radius:6px;
  background:#1E293B;
  font-size:11px;
}

.today{
  background:#22C55E !important;
  color:#0F172A;
}

/* PARTNERS */

.section{
  border:2px solid #1E293B;
  border-radius:12px;
  padding:15px;
  background:#0F172A;
  width:270px;
  margin:auto;
}

.section-title{
  background:#1E293B;
  border-radius:30px;
  padding:10px;
  margin-bottom:15px;
  color:#22C55E;
  font-weight:bold;
}

.partner-card{
  background:#1E293B;
  border:1px solid #1E293B;
  border-radius:14px;
  padding:15px;
  text-align:center;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.partner-card:hover{
  transform:scale(1.03);
  border-color:#22C55E;
}

.partner-img{
  width:70px;
  height:70px;
  border-radius:12px;
  object-fit:cover;
}

.partner-name{
  margin-top:8px;
  font-size:14px;
}

</style>
</head>

<body>

<div class="rgbBorder"></div>

<div class="mainBox">

<div class="pixelGlowBox">
<div class="pixelBorder"></div>

<div id="pixelText">
PIXEL GLOW
</div>

</div>

<br>

<div class="themeText" style="font-size:15px;letter-spacing:2px;overflow:hidden;">

<marquee behavior="scroll" direction="left" scrollamount="3">
♣Welcome to Our Club♣
</marquee>

</div>

<br>

<div style="font-size:11px;letter-spacing:3px;">

<span class="themeText" style="font-size:14px;">
✧ 𝐎 𝐖 𝐍 𝐄 𝐑 ✧
</span>

</div>

<div style="margin-top:6px;">

<img
src="https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/yogi136/php8h3mmr9lb0qd8ZyClyS.png"
width="100"
height="100"
style="border-radius:12px;border:2px solid #1E293B;">

</div>

<div
class="themeText"
style="
font-size:22px;
font-weight:900;
font-family:cursive;
margin-top:6px;
">
√𝓎𝓸𝓰𝓲136
</div>

<div class="line"></div>

<div style="font-size:12px;font-style:italic;">
“Think like a King. Play like a Master.”
</div>

<br>

<!-- PLAYER -->

<div class="player">

<div class="live-dot"></div>

<div class="marquee">
<span id="songText">Now Playing:</span>
</div>

<div class="screen">

<iframe
id="playerFrame"
src=""
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

</div>

<div class="controls">

<button onclick="prevSong()">⏮</button>
<button onclick="playVideo()">▶</button>
<button onclick="pauseVideo()">❚❚</button>
<button onclick="nextSong()">⏭</button>

</div>

</div>

<br>

<!-- CHESSBOARD -->

<div class="board-wrapper">

<div class="title">
Magnus Carlsen vs Veselin Topalov (2010)
</div>

<div class="board" id="board"></div>

</div>

<br>
<br>

<!-- CALENDAR -->

<div class="calendar">

<div class="header" id="monthYear"></div>

<div class="days">
<div>S</div>
<div>M</div>
<div>T</div>
<div>W</div>
<div>T</div>
<div>F</div>
<div>S</div>
</div>

<div class="dates" id="dates"></div>

</div>

<br>

<!-- PARTNERS -->

<div class="section">

<div class="section-title">
◆ PARTNERS ◆
</div>

<div id="partnersContainer"></div>

</div>

<br>

<div style="
font-size:22px;
font-weight:900;
font-family:cursive;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:discoRGB 6s ease-in-out infinite;
display:inline-block;
">
Made by yogi136
</div>

</div>

<script>

/* SONGS */

let songs = [

{
src:"https://youtu.be/R5aurUlfn3w",
name:"Monody - TheFatRat"
},

{
src:"https://youtu.be/k50D8-EvNxk",
name:"Meu Abrigo - Melim"
}

];

let songIndex = 0;

const frame = document.getElementById("playerFrame");
const songText = document.getElementById("songText");

function convert(url){

if(url.includes("youtu.be")){

let id = url.split("youtu.be/")[1].split("?")[0];

return "https://www.youtube.com/embed/" +
id +
"?enablejsapi=1";

}

return url;

}

function loadVideo(i){

frame.src = convert(songs[i].src);

songText.innerText =
"Now Playing: " + songs[i].name;

}

function prevSong(){

songIndex--;

if(songIndex < 0){
songIndex = songs.length - 1;
}

loadVideo(songIndex);

}

function nextSong(){

songIndex++;

if(songIndex >= songs.length){
songIndex = 0;
}

loadVideo(songIndex);

}

function playVideo(){

frame.contentWindow.postMessage(
'{"event":"command","func":"playVideo","args":""}',
"*"
);

}

function pauseVideo(){

frame.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo","args":""}',
"*"
);

}

loadVideo(songIndex);

/* CHESSBOARD */

const img = {

P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",

p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"

};

const startState = [

"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"

];

let state = [...startState];

const board =
document.getElementById("board");

const moves = [

[52,36],[11,27],
[36,27],[3,27],
[57,42],[27,24],
[51,35],[6,21],
[62,45],[10,18],
[61,34],[2,29],
[34,43],[12,20],
[59,52],[29,38],
castleWhite(),
[1,18],
[43,34],
castleBlack(),
[55,39],
[8,16],
[45,28]

];

function castleWhite(){
return ["castleWhite"];
}

function castleBlack(){
return ["castleBlack"];
}

function draw(){

board.innerHTML = "";

state.forEach((p,i)=>{

const sq =
document.createElement("div");

const r = Math.floor(i/8);
const c = i%8;

sq.className =
"square " + ((r+c)%2 ? "black" : "white");

if(p){

const im =
document.createElement("img");

im.className = "piece";

im.src = img[p];

sq.appendChild(im);

}

board.appendChild(sq);

});

}

function addCoords(){

const wrapper =
document.querySelector(".board-wrapper");

const files =
["A","B","C","D","E","F","G","H"];

for(let i=0;i<8;i++){

const f =
document.createElement("div");

f.className = "coord file";

f.style.left =
(i*32 + 18) + "px";

f.textContent = files[i];

wrapper.appendChild(f);

}

for(let i=0;i<8;i++){

const r =
document.createElement("div");

r.className = "coord rank";

r.style.top =
(i*32 + 16) + "px";

r.textContent = 8-i;

wrapper.appendChild(r);

}

}

addCoords();

function resetBoard(){

state = [...startState];

moveIndex = 0;

draw();

}

let moveIndex = 0;

function play(){

if(moveIndex >= moves.length){

setTimeout(()=>{

resetBoard();

play();

},2500);

return;

}

setTimeout(()=>{

const move = moves[moveIndex];

if(move[0] === "castleWhite"){

state[62] = state[60];
state[60] = "";

state[61] = state[63];
state[63] = "";

}

else if(move[0] === "castleBlack"){

state[6] = state[4];
state[4] = "";

state[5] = state[7];
state[7] = "";

}

else{

const [from,to] = move;

state[to] = state[from];
state[from] = "";

}

draw();

moveIndex++;

play();

},700);

}

draw();
play();

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [

"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"

];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month + 1,0).getDate();

for(let i=0;i<firstDay;i++){

dates.innerHTML += "<div></div>";

}

for(let i=1;i<=lastDate;i++){

if(i === today){

dates.innerHTML +=
`<div class="today">${i}</div>`;

}

else{

dates.innerHTML += `<div>${i}</div>`;

}

}

/* PARTNERS */

const partners = [

{
name:"SAPPHIRE",
img:"https://i.ibb.co/4RYLGQ3z/image.jpg",
link:"https://www.chess.com/club/sapphire-1"
},

{
name:"penguin chess club",
img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",
link:"https://www.chess.com/club/penguin-chess-club-3"
}

];

const container =
document.getElementById("partnersContainer");

partners.forEach(p=>{

const card =
document.createElement("div");

card.className = "partner-card";

card.innerHTML = `
<img src="${p.img}" class="partner-img">
<div class="partner-name">${p.name}</div>
`;

card.onclick = ()=>{

window.open(p.link,"_blank");

};

container.appendChild(card);

});

/* RGB THEME */

const themes = [

{
bg:"#0F172A",
border:"#22C55E",
glow:"rgba(34,197,94,0.5)",
text:"#22C55E"
},

{
bg:"#111827",
border:"#3B82F6",
glow:"rgba(59,130,246,0.5)",
text:"#3B82F6"
}

];

let index = 0;

function changeTheme(){

const theme = themes[index];

document.body.style.background = theme.bg;

document.querySelector(".mainBox").style.borderColor =
theme.border;

document.querySelector(".mainBox").style.boxShadow =
`0 0 25px ${theme.glow}`;

document.querySelector(".player").style.borderColor =
theme.border;

document.querySelector(".calendar").style.borderColor =
theme.border;

document.querySelector(".section").style.borderColor =
theme.border;

document.querySelectorAll(".themeText").forEach(el=>{

el.style.color = theme.text;

el.style.textShadow =
`0 0 12px ${theme.glow}`;

});

document.getElementById("pixelText").style.color =
theme.text;

index++;

if(index >= themes.length){
index = 0;
}

}

setInterval(changeTheme,6000);

changeTheme();

</script>

</body>
</html>
