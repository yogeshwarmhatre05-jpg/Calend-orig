<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 40px;
  font-family:'Poppins',sans-serif;

  background:
  radial-gradient(circle at top,#1e3a8a 0%,#0f172a 45%,#020617 100%);

  color:#f5d77a;
  position:relative;
}

/* (KEEP ALL YOUR EXISTING CSS HERE EXACTLY AS YOU HAD IT) */

/* ===== CHESSBOARD (ONLY ADDITION) ===== */

.board-wrapper{
  position:relative;
  display:flex;
  justify-content:center;
  margin:18px 0;
}

.board{
  width:300px;
  height:300px;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  border:8px solid #020617;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

.white{
  background:linear-gradient(145deg,#e8eef5,#cfd8e3);
}

.black{
  background:linear-gradient(145deg,#4b6584,#2f4858);
}

.square{
  display:flex;
  justify-content:center;
  align-items:center;
}

.piece{
  width:85%;
  height:85%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
}

.title{
  position:absolute;
  top:-22px;
  left:0;
  font-size:11px;
  color:white;
  font-weight:bold;
}

/* ===== YOUR ORIGINAL CSS CONTINUES (CALENDAR, MUSIC, ETC) ===== */

</style>
</head>

<body>

<div class="gold-border"></div>

<div class="top-section">

  <div class="welcome-top">
    <div class="welcome-text">SAPPHIRE</div>
  </div>

  <div class="owner-box">
    <div class="owner-title">OWNER</div>
    <div class="owner-name">Rosemarie</div>
  </div>

</div>

<div class="wrapper">

  <!-- MUSIC PLAYER -->
  <div class="music-player">
    <div class="song">Now Playing : CHIHIRO - Billie Eilish</div>

    <div class="screen">
      <iframe id="playerFrame"
      src="https://www.youtube.com/embed/e_AZJzYe7CU?enablejsapi=1"
      allow="autoplay; encrypted-media"
      allowfullscreen></iframe>
    </div>

    <div class="controls">
      <button id="playBtn">PLAY</button>
    </div>
  </div>

  <!-- ✅ CHESSBOARD INSERTED HERE (ONLY CHANGE) -->
  <div class="board-wrapper">

    <div class="title">
      Magnus Carlsen vs Veselin Topalov (2010)
    </div>

    <div class="board" id="board"></div>

  </div>

  <!-- CALENDAR -->
  <div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>

  </div>

</div>

<script>

/* ===== MUSIC PLAYER (UNCHANGED) ===== */

const frame = document.getElementById("playerFrame");
const playBtn = document.getElementById("playBtn");
let playing = false;

playBtn.addEventListener("click",()=>{

  if(!playing){
    frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*");
    playBtn.innerText = "PAUSE";
  }else{
    frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*");
    playBtn.innerText = "PLAY";
  }

  playing = !playing;

});

/* ===== CHESS LOGIC (ONLY ADDITION) ===== */

const img = {
  P:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png",
  R:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png",
  N:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png",
  B:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png",
  Q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png",
  K:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png",
  p:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png",
  r:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png",
  n:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png",
  b:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png",
  q:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png",
  k:"https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png"
};

const startState = [
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let state = [...startState];

const board = document.getElementById("board");

function draw(){
  board.innerHTML = "";
  state.forEach((p,i)=>{
    const sq = document.createElement("div");
    const r = Math.floor(i/8);
    const c = i%8;
    sq.className = "square " + ((r+c)%2 ? "black" : "white");

    if(p){
      const im = document.createElement("img");
      im.className = "piece";
      im.src = img[p];
      sq.appendChild(im);
    }

    board.appendChild(sq);
  });
}

draw();

/* ===== CALENDAR (UNCHANGED) ===== */

const monthYear = document.getElementById("monthYear");
const dates = document.getElementById("dates");

const now = new Date();
const year = now.getFullYear();
const month = now.getMonth();
const today = now.getDate();

const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

monthYear.innerText = `${months[month]} ${year}`;

const firstDay = new Date(year,month,1).getDay();
const lastDate = new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
  dates.innerHTML += `<div></div>`;
}

for(let i=1;i<=lastDate;i++){
  dates.innerHTML += `<div class="${i===today?'today':''}">${i}</div>`;
}

</script>

</body>
</html>
